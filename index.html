<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria Demo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

.secao{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.1);
}

h2{
color:#c62828;
margin-bottom:10px;
}

.produto{
border-bottom:1px solid #ddd;
padding:12px 0;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.remover{
background:#c62828;
}

input,
select,
textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:80px;
resize:none;
}

.oculto{
display:none;
}

.itemCarrinho{
border-bottom:1px dashed #ccc;
padding:10px 0;
}

#modal{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
padding:15px;
}

#modalBox{
background:white;
width:100%;
max-width:500px;
padding:15px;
border-radius:10px;
}

.fechar{
background:#666;
}

#total{
font-size:22px;
font-weight:bold;
color:#c62828;
}

#telaStatus{
display:none;
}

.statusBox{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.1);
}

#statusAtual{
font-size:24px;
font-weight:bold;
margin-top:10px;
margin-bottom:20px;
color:#c62828;
}

#resumoFinal{
white-space:pre-line;
line-height:1.6;
}

.controles{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

.controles button{
margin:0;
width:40px;
}

</style>
</head>
<body>

<div id="telaPedido">

<div class="secao">

<h2>Cardápio</h2>

<div id="listaProdutos"></div>

</div>

<div class="secao">

<h2>Carrinho</h2>

<div id="carrinho">
Nenhum item adicionado.
</div>

<br>

<div id="total">
R$ 0,00
</div>

</div>

<div class="secao">

<h2>Dados do Cliente</h2>

<label>Nome</label>
<input id="nome">

<label>Telefone</label>
<input id="telefone">

<label>Endereço</label>
<input id="endereco">

<label>Pagamento</label>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<label>
<input type="checkbox" id="trocoCheck">
Precisa de troco
</label>

<div id="trocoArea" class="oculto">

<label>Troco para quanto?</label>
<input id="trocoPara">

</div>

<button onclick="finalizarPedido()">
Finalizar Pedido
</button>

</div>

</div>

<div id="telaStatus">

<div class="statusBox">

<h2 id="numeroPedido">
Pedido #0001
</h2>

<div id="statusAtual">
Pedido Recebido ✅
</div>

<div id="resumoFinal"></div>

</div>

</div>

<div id="modal">

<div id="modalBox">

<h2 id="tituloPizza"></h2>

<label>Tipo</label>

<select id="tipoPizza">
<option value="inteira">Inteira</option>
<option value="meia">Meio a Meio</option>
</select>

<div id="areaSegundoSabor" class="oculto">

<label>Segundo Sabor</label>

<select id="segundoSabor"></select>

</div>

<label>Quantidade</label>

<input
id="quantidadePizza"
type="number"
value="1"
min="1">

<label>Borda</label>

<select id="bordaPizza">

<option value="Sem borda">
Sem borda
</option>

<option value="Catupiry">
Catupiry (+5)
</option>

<option value="Cheddar">
Cheddar (+5)
</option>

<option value="Chocolate">
Chocolate (+8)
</option>

</select>
<label>Observações</label>

<textarea
id="observacaoPizza"
placeholder="Sem cebola, sem azeitona..."
></textarea>

<button onclick="confirmarPizza()">
Adicionar ao Carrinho
</button>

<button
class="fechar"
onclick="fecharModal()">
Cancelar
</button>

</div>

</div>

<script>

const produtos = [

{
nome:"Calabresa",
categoria:"Pizza",
descricao:"Molho de tomate, queijo muçarela, calabresa fatiada, cebola e orégano",
preco:45
},

{
nome:"Muçarela",
categoria:"Pizza",
descricao:"Molho de tomate, queijo muçarela, tomate e orégano",
preco:45
},

{
nome:"Frango com Catupiry",
categoria:"Pizza",
descricao:"Molho de tomate, queijo muçarela, frango desfiado, catupiry e orégano",
preco:45
},

{
nome:"Portuguesa",
categoria:"Pizza",
descricao:"Molho de tomate, queijo muçarela, presunto, ovos, cebola, ervilha e orégano",
preco:45
},

{
nome:"Coca-Cola 2L",
categoria:"Bebida",
descricao:"Refrigerante Coca-Cola 2 litros",
preco:15
},

{
nome:"Guaraná Antarctica 2L",
categoria:"Bebida",
descricao:"Refrigerante Guaraná Antarctica 2 litros",
preco:15
}

];

let carrinho = [];
let pizzaAtual = null;
let totalGeral = 0;

document.getElementById("trocoCheck")
.addEventListener(
"change",
function(){

document.getElementById(
"trocoArea"
).classList.toggle(
"oculto",
!this.checked
);

}
);

document.getElementById("tipoPizza")
.addEventListener(
"change",
function(){

document.getElementById(
"areaSegundoSabor"
).classList.toggle(
"oculto",
this.value !== "meia"
);

}
);

function carregarProdutos(){

let html = "";

produtos.forEach((p,i)=>{

html += `
<div class="produto">

<b>${p.nome}</b>

<br>

${p.descricao}

<br><br>

R$ ${p.preco.toFixed(2)}

<br>

${
p.categoria==="Pizza"
?
`<button onclick="abrirPizza(${i})">Escolher</button>`
:
`<button onclick="addBebida(${i})">Adicionar</button>`
}

</div>
`;

});

document.getElementById(
"listaProdutos"
).innerHTML = html;

}
function abrirPizza(index){

pizzaAtual = produtos[index];

document.getElementById(
"tituloPizza"
).innerText =
pizzaAtual.nome;

document.getElementById(
"quantidadePizza"
).value = 1;

document.getElementById(
"bordaPizza"
).value = "Sem borda";

document.getElementById(
"observacaoPizza"
).value = "";

const select =
document.getElementById(
"segundoSabor"
);

select.innerHTML = "";

produtos
.filter(
p => p.categoria==="Pizza"
)
.forEach(p=>{

if(
p.nome !== pizzaAtual.nome
){

select.innerHTML += `
<option value="${p.nome}">
${p.nome}
</option>
`;

}

});

document.getElementById(
"tipoPizza"
).value =
"inteira";

document.getElementById(
"areaSegundoSabor"
).classList.add(
"oculto"
);

document.getElementById(
"modal"
).style.display =
"flex";

}

function fecharModal(){

document.getElementById(
"modal"
).style.display =
"none";

}

function confirmarPizza(){

const tipo =
document.getElementById(
"tipoPizza"
).value;

const obs =
document.getElementById(
"observacaoPizza"
).value;

const quantidade =
parseInt(
document.getElementById(
"quantidadePizza"
).value
) || 1;

const borda =
document.getElementById(
"bordaPizza"
).value;

let valorBorda = 0;

if(
borda==="Catupiry" ||
borda==="Cheddar"
){
valorBorda = 5;
}

if(
borda==="Chocolate"
){
valorBorda = 8;
}

const precoFinal =
(pizzaAtual.preco + valorBorda)
* quantidade;

let item = {

tipo:"pizza",

modo:tipo,

sabor1:pizzaAtual.nome,

sabor2:
tipo==="meia"
?
document.getElementById(
"segundoSabor"
).value
:
"",

observacao:obs,

quantidade:quantidade,

borda:borda,

preco:precoFinal

};

carrinho.push(item);

fecharModal();

renderizarCarrinho();

}

function addBebida(index){

const bebida =
produtos[index];

const existente =
carrinho.find(
item =>
item.tipo==="bebida" &&
item.nome===bebida.nome
);

if(existente){

existente.quantidade++;

existente.precoTotal =
existente.quantidade *
existente.precoUnitario;

}else{

carrinho.push({

tipo:"bebida",

nome:bebida.nome,

quantidade:1,

precoUnitario:
bebida.preco,

precoTotal:
bebida.preco

});

}

renderizarCarrinho();

}
function removerItem(index){

carrinho.splice(index,1);

renderizarCarrinho();

}

function alterarQuantidadeBebida(index,valor){

carrinho[index].quantidade += valor;

if(
carrinho[index].quantidade <= 0
){

carrinho.splice(index,1);

}else{

carrinho[index].precoTotal =
carrinho[index].quantidade *
carrinho[index].precoUnitario;

}

renderizarCarrinho();

}

function renderizarCarrinho(){

const area =
document.getElementById(
"carrinho"
);

if(
carrinho.length===0
){

area.innerHTML =
"Nenhum item adicionado.";

document.getElementById(
"total"
).innerText =
"R$ 0,00";

totalGeral = 0;

return;

}

area.innerHTML = "";

totalGeral = 0;

carrinho.forEach(
(item,index)=>{

let html = "";

if(
item.tipo==="pizza"
){

html += `

<div class="itemCarrinho">

<b>
${item.quantidade}x Pizza
</b>

<br>

${
item.modo==="meia"
?
`${item.sabor1} / ${item.sabor2}`
:
item.sabor1
}

<br>

Borda:
${item.borda}

`;

if(item.observacao){

html += `

<br>

Obs:
${item.observacao}

`;

}

html += `

<br>

R$ ${item.preco.toFixed(2)}

<br>

<button
class="remover"
onclick="
removerItem(${index})
">
Remover
</button>

</div>

`;

totalGeral +=
item.preco;

}else{

html += `

<div class="itemCarrinho">

<b>
${item.nome}
</b>

<br>

<div class="controles">

<button
onclick="
alterarQuantidadeBebida(${index},-1)
">
-
</button>

<span>
${item.quantidade}
</span>

<button
onclick="
alterarQuantidadeBebida(${index},1)
">
+
</button>

</div>

R$
${item.precoTotal.toFixed(2)}

<br>

<button
class="remover"
onclick="
removerItem(${index})
">
Remover
</button>

</div>

`;

totalGeral +=
item.precoTotal;

}

area.innerHTML +=
html;

});

document.getElementById(
"total"
).innerText =
"R$ " +
totalGeral.toFixed(2);

}
function atualizarStatusPedido(){

setTimeout(()=>{

document.getElementById(
"statusAtual"
).innerText =
"Preparando 🍕";

},5000);

setTimeout(()=>{

document.getElementById(
"statusAtual"
).innerText =
"Saiu para Entrega 🛵";

},10000);

setTimeout(()=>{

document.getElementById(
"statusAtual"
).innerText =
"Entregue 🎉";

},15000);

}

function finalizarPedido(){

if(carrinho.length===0){

alert(
"Adicione itens ao carrinho"
);

return;

}

const nome =
document.getElementById(
"nome"
).value.trim();

const telefone =
document.getElementById(
"telefone"
).value.trim();

const endereco =
document.getElementById(
"endereco"
).value.trim();

if(
!nome ||
!telefone ||
!endereco
){

alert(
"Preencha nome, telefone e endereço."
);

return;

}

const pagamento =
document.getElementById(
"pagamento"
).value;

let resumo = "";

carrinho.forEach(item=>{

if(item.tipo==="pizza"){

resumo +=
item.quantidade +
"x Pizza\n";

if(item.modo==="meia"){

resumo +=
item.sabor1 +
" / " +
item.sabor2 +
"\n";

}else{

resumo +=
item.sabor1 +
"\n";

}

resumo +=
"Borda: " +
item.borda +
"\n";

if(item.observacao){

resumo +=
"Obs: " +
item.observacao +
"\n";

}

resumo +=
"R$ " +
item.preco.toFixed(2) +
"\n\n";

}else{

resumo +=
item.quantidade +
"x " +
item.nome +
"\n";

resumo +=
"R$ " +
item.precoTotal.toFixed(2) +
"\n\n";

}

});

let numeroPedido =
Math.floor(
1000 + Math.random() * 9000
);

let mensagem =

"Pedido #" +
numeroPedido +
"\n\n" +

"Cliente: " +
nome +
"\n\n" +

"Telefone: " +
telefone +
"\n\n" +

"Endereço: " +
endereco +
"\n\n" +

resumo +

"\nTOTAL: R$ " +
totalGeral.toFixed(2) +
"\n\n" +

"Pagamento: " +
pagamento +
"\n";

if(
document.getElementById(
"trocoCheck"
).checked
){

mensagem +=

"Troco para: R$ " +

document.getElementById(
"trocoPara"
).value +

"\n";

}

document.getElementById(
"telaPedido"
).style.display =
"none";

document.getElementById(
"telaStatus"
).style.display =
"block";

document.getElementById(
"numeroPedido"
).innerText =
"Pedido #" +
numeroPedido;

document.getElementById(
"resumoFinal"
).innerText =
mensagem;

atualizarStatusPedido();

}

carregarProdutos();

</script>

</body>
</html>
